name: Docker Sample Publish

# This workflow builds and publishes the LabEG.NeedleCrud.Sample project as a Docker image
# It is triggered on push to main branch or manually via workflow dispatch

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-publish:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore LabEG.NeedleCrud.Sample/LabEG.NeedleCrud.Sample.csproj

      - name: Build project
        run: dotnet build LabEG.NeedleCrud.Sample/LabEG.NeedleCrud.Sample.csproj --configuration Release --no-restore

      - name: Test project
        run: dotnet test LabEG.NeedleCrud.Sample/LabEG.NeedleCrud.Sample.csproj --configuration Release --no-build

      - name: Publish project
        run: dotnet publish LabEG.NeedleCrud.Sample/LabEG.NeedleCrud.Sample.csproj --configuration Release --no-build --output ./publish

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: LabEG.NeedleCrud.Sample/Dockerfile
          push: true
          tags: labeg/needlecrud-sample:latest, labeg/needlecrud-sample:1, labeg/needlecrud-sample:1.0
          platforms: linux/amd64, linux/arm64/v8
          cache-from: type=registry,ref=labeg/needlecrud-sample:latest
          cache-to: type=inline
